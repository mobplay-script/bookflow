name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Nilai dummy — build & test tidak melakukan koneksi DB, hanya butuh env ada.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?sslmode=require"
      AUTH_SECRET: "ci-dummy-secret-not-for-production-0000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
